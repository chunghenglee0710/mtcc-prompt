<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>議會質詢即時提示系統</title>
    <!-- MQTT 雲端即時傳輸庫 -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", sans-serif; overflow: hidden; background-color: #000; color: #fff; touch-action: manipulation; }
        
        /* 選擇身份頁面 */
        .mode-selector { display: flex; flex-direction: column; height: 100vh; justify-content: center; align-items: center; gap: 20px; background: #1c1c1e; padding: 20px; }
        .mode-btn { width: 100%; max-width: 320px; padding: 20px; font-size: 22px; font-weight: bold; cursor: pointer; border: none; border-radius: 14px; color: white; transition: 0.2s; text-align: center; }
        .btn-display { background: #007aff; }
        .btn-control { background: #34c759; }

        /* 長官 iPad 顯示端 */
        #display-view { display: none; width: 100vw; height: 100vh; background: #000; flex-direction: column; justify-content: space-between; align-items: center; padding: 2vh 2vw; text-align: center; position: relative; user-select: none; }
        .display-header { width: 100%; display: flex; justify-content: space-between; align-items: center; height: 60px; padding: 0 20px; }
        #sender-tag { font-size: 3.5vw; color: #ffd60a; font-weight: bold; }
        #history-counter { font-size: 2vw; color: #8e8e93; background: #1c1c1e; padding: 4px 14px; border-radius: 20px; }
        
        #message-container { flex-grow: 1; width: 100%; display: flex; justify-content: center; align-items: center; padding: 10px; overflow: hidden; }
        #message-box { 
            font-weight: 900; 
            line-height: 1.2; 
            letter-spacing: 1px;
            color: #ffffff;
            word-break: break-all;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* 左右切換按鈕輔助 */
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.15); color: white; border: none; font-size: 30px; width: 50px; height: 80px; border-radius: 10px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .nav-left { left: 10px; }
        .nav-right { right: 10px; }

        /* 主管控制端 */
        #control-view { display: none; padding: 20px; max-width: 600px; margin: 0 auto; color: #f2f2f7; background: #1c1c1e; height: 100vh; overflow-y: auto; }
        .control-title { font-size: 22px; font-weight: bold; margin-bottom: 15px; text-align: center; color: #fff; }
        .input-group { margin-bottom: 12px; }
        label { font-size: 14px; color: #8e8e93; display: block; margin-bottom: 5px; }
        input[type="text"] { width: 100%; padding: 12px; font-size: 18px; border-radius: 10px; border: 1px solid #38383a; background: #2c2c2e; color: #fff; }
        textarea { width: 100%; height: 90px; font-size: 20px; padding: 12px; border-radius: 10px; border: 1px solid #38383a; background: #2c2c2e; color: #fff; resize: none; margin-bottom: 5px; }
        .char-count { text-align: right; font-size: 12px; color: #8e8e93; margin-bottom: 10px; }
        
        .send-btn { width: 100%; padding: 16px; font-size: 22px; font-weight: bold; background: #30d158; color: white; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 8px; }
        .clear-btn { background: #ff453a; }
        .status-tag { text-align: center; font-size: 13px; color: #30d158; margin-bottom: 10px; }

        /* 快捷詞編輯區 */
        .presets-header { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; margin-bottom: 10px; border-top: 1px solid #38383a; padding-top: 15px; }
        .btn-group-right { display: flex; gap: 8px; }
        .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 30px; }
        .preset-btn { padding: 12px; font-size: 15px; background: #2c2c2e; border: 1px solid #38383a; border-radius: 8px; color: #fff; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
        .preset-btn:active { background: #007aff; }
        .edit-input { width: 100%; padding: 10px; font-size: 14px; background: #1c1c1e; border: 1px solid #007aff; border-radius: 8px; color: #fff; }
        .toggle-edit-btn { background: #0a84ff; color: white; border: none; padding: 6px 14px; border-radius: 6px; font-size: 14px; cursor: pointer; }
        .reset-btn { background: #636366; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 14px; cursor: pointer; display: none; }
    </style>
</head>
<body>

    <!-- 1. 選擇身份 -->
    <div id="setup-view" class="mode-selector">
        <h2 style="margin-bottom: 20px;">議會質詢即時提示系統</h2>
        <button class="mode-btn btn-display" onclick="startDisplay()">長官 iPad（顯示端）</button>
        <button class="mode-btn btn-control" onclick="startControl()">主管/幕僚（控制端）</button>
    </div>

    <!-- 2. 長官 iPad 顯示頁面 -->
    <div id="display-view">
        <div class="display-header">
            <div id="sender-tag"></div>
            <div id="history-counter">0/0</div>
        </div>
        
        <div id="message-container">
            <div id="message-box">等待訊息輸入...</div>
        </div>

        <button class="nav-btn nav-left" onclick="navigateHistory(-1)">❮</button>
        <button class="nav-btn nav-right" onclick="navigateHistory(1)">❯</button>
    </div>

    <!-- 3. 主管控制頁面 -->
    <div id="control-view">
        <div class="control-title">主管推播控制台</div>
        <div id="status" class="status-tag">雲端連線中...</div>
        
        <div class="input-group">
            <label>您的單位/職稱</label>
            <input type="text" id="sender-input" placeholder="例如：行政處" value="行政處">
        </div>

        <div class="input-group">
            <label>提示訊息（上限 50 字）</label>
            <textarea id="text-input" maxlength="50" oninput="updateCharCount()" placeholder="請輸入訊息..."></textarea>
            <div class="char-count"><span id="char-num">0</span> / 50 字</div>
        </div>

        <button class="send-btn" onclick="sendMessage()">立即傳送至長官螢幕</button>
        <button class="send-btn clear-btn" onclick="clearMessage()">清空長官螢幕</button>

        <!-- 常用 10 組快捷詞區塊 -->
        <div class="presets-header">
            <span style="font-weight: bold;">自訂 10 組快捷詞：</span>
            <div class="btn-group-right">
                <button class="reset-btn" id="reset-preset-btn" onclick="restoreDefaultPresets()">恢復預設</button>
                <button class="toggle-edit-btn" id="edit-preset-btn" onclick="toggleEditPresets()">設定快捷詞</button>
            </div>
        </div>
        <div class="preset-grid" id="preset-container"></div>
    </div>

    <script>
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        const TOPIC = 'matsu_parliament_prompt_2026';

        // 長官端歷史紀錄
        let historyList = []; 
        let currentIndex = -1;

        // 系統標準 10 組預設快捷詞
        const systemDefaultPresets = [
            "已交辦權責局處辦理",
            "預算已於本期編列",
            "預計今年底前完成",
            "會後提供書面資料",
            "研議研擬方案辦理",
            "積極向中央爭取補助",
            "感謝議員關心與指教",
            "配合中央法規推動",
            "本案刻正進行規劃",
            "相關數據會後補充"
        ];

        // 當前使用中的快捷詞陣列
        let myPresets = [...systemDefaultPresets];
        let isEditing = false;

        client.on('connect', () => {
            if (document.getElementById('status')) {
                document.getElementById('status').innerText = '● 雲端通訊連線正常';
            }
        });

        /* --- 長官端邏輯 --- */
        function startDisplay() {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('display-view').style.display = 'flex';
            
            client.subscribe(TOPIC);
            client.on('message', (topic, payload) => {
                const data = JSON.parse(payload.toString());
                
                if (data.text === '') {
                    historyList = [];
                    currentIndex = -1;
                    renderDisplay('', '等待訊息輸入...');
                    document.getElementById('history-counter').innerText = '0/0';
                    return;
                }

                historyList.push(data);
                if (historyList.length > 10) {
                    historyList.shift();
                }
                
                currentIndex = historyList.length - 1;
                updateDisplayView();
            });

            setupTouchEvents();
        }

        function updateDisplayView() {
            if (currentIndex >= 0 && currentIndex < historyList.length) {
                const item = historyList[currentIndex];
                renderDisplay(item.sender, item.text);
                document.getElementById('history-counter').innerText = `${currentIndex + 1}/${historyList.length}`;
            }
        }

        function renderDisplay(sender, text) {
            const messageBox = document.getElementById('message-box');
            const senderTag = document.getElementById('sender-tag');
            
            senderTag.innerText = sender ? `【${sender}】` : '';
            messageBox.innerText = text;
            adjustFontSize(text ? text.length : 0);
        }

        function navigateHistory(direction) {
            if (historyList.length === 0) return;
            let newIndex = currentIndex + direction;
            if (newIndex >= 0 && newIndex < historyList.length) {
                currentIndex = newIndex;
                updateDisplayView();
            }
        }

        let touchStartX = 0;
        function setupTouchEvents() {
            const displayView = document.getElementById('display-view');
            displayView.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
            displayView.addEventListener('touchend', e => {
                let touchEndX = e.changedTouches[0].screenX;
                if (touchStartX - touchEndX > 50) navigateHistory(1);
                if (touchEndX - touchStartX > 50) navigateHistory(-1);
            });
        }

        function adjustFontSize(length) {
            const box = document.getElementById('message-box');
            if (length === 0) return;
            
            if (length <= 6) {
                box.style.fontSize = '18vw';
            } else if (length <= 12) {
                box.style.fontSize = '13vw';
            } else if (length <= 20) {
                box.style.fontSize = '9.5vw';
            } else if (length <= 35) {
                box.style.fontSize = '6.8vw';
            } else {
                box.style.fontSize = '5.2vw';
            }
        }

        /* --- 主管端邏輯 --- */
        function startControl() {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('control-view').style.display = 'block';
            loadPresetsFromStorage();
            renderPresets();
        }

        function updateCharCount() {
            const text = document.getElementById('text-input').value;
            document.getElementById('char-num').innerText = text.length;
        }

        function sendMessage() {
            const sender = document.getElementById('sender-input').value.trim();
            const text = document.getElementById('text-input').value.trim();
            if (text) {
                const payload = JSON.stringify({ sender: sender, text: text });
                client.publish(TOPIC, payload);
            }
        }

        function sendPresetByIndex(index) {
            const text = myPresets[index];
            if (text) {
                document.getElementById('text-input').value = text;
                updateCharCount();
                sendMessage();
            }
        }

        function clearMessage() {
            document.getElementById('text-input').value = '';
            updateCharCount();
            const payload = JSON.stringify({ sender: '', text: '' });
            client.publish(TOPIC, payload);
        }

        /* --- 快捷詞管理與恢復預設 --- */
        function loadPresetsFromStorage() {
            const saved = localStorage.getItem('matsu_parliament_presets_v2');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (Array.isArray(parsed) && parsed.length === 10) {
                        myPresets = parsed;
                    }
                } catch(e) {
                    console.error("記憶庫讀取異常");
                }
            }
        }

        function renderPresets() {
            const container = document.getElementById('preset-container');
            container.innerHTML = '';

            myPresets.forEach((presetText, index) => {
                if (isEditing) {
                    container.innerHTML += `
                        <input type="text" class="edit-input" id="preset-input-${index}" value="${presetText}" placeholder="快捷詞 ${index + 1}">
                    `;
                } else {
                    container.innerHTML += `
                        <button class="preset-btn" onclick="sendPresetByIndex(${index})">${index + 1}. ${presetText}</button>
                    `;
                }
            });
        }

        function toggleEditPresets() {
            const editBtn = document.getElementById('edit-preset-btn');
            const resetBtn = document.getElementById('reset-preset-btn');
            
            if (!isEditing) {
                // 開啟編輯模式，顯示「恢復預設」按鈕
                isEditing = true;
                editBtn.innerText = '儲存快捷詞';
                editBtn.style.background = '#30d158';
                resetBtn.style.display = 'block';
                renderPresets();
            } else {
                // 讀取輸入內容並寫入記憶
                for (let i = 0; i < 10; i++) {
                    const inputEl = document.getElementById(`preset-input-${i}`);
                    if (inputEl) {
                        myPresets[i] = inputEl.value.trim() || `快捷詞 ${i + 1}`;
                    }
                }
                
                localStorage.setItem('matsu_parliament_presets_v2', JSON.stringify(myPresets));
                
                isEditing = false;
                editBtn.innerText = '設定快捷詞';
                editBtn.style.background = '#0a84ff';
                resetBtn.style.display = 'none';
                renderPresets();
            }
        }

        // 一鍵恢復系統預設值
        function restoreDefaultPresets() {
            if (confirm("確定要將 10 組快捷詞恢復為系統預設值嗎？")) {
                myPresets = [...systemDefaultPresets];
                localStorage.setItem('matsu_parliament_presets_v2', JSON.stringify(myPresets));
                renderPresets();
            }
        }
    </script>
</body>
</html>
