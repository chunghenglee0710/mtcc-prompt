<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>連江縣政府行政處議會質詢即時提示系統</title>
    <!-- MQTT 雲端即時傳輸庫 -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", sans-serif; overflow: hidden; background-color: #000; color: #fff; touch-action: manipulation; }
        
        /* 1. 選擇身份頁面 */
        .mode-selector { display: flex; flex-direction: column; min-height: 100vh; justify-content: center; align-items: center; gap: 15px; background: #1c1c1e; padding: 20px; text-align: center; overflow-y: auto; }
        .mode-selector h2 { font-size: 24px; font-weight: bold; color: #fff; line-height: 1.4; max-width: 500px; }
        .mode-selector p { font-size: 14px; color: #8e8e93; }
        
        /* 資安警語告示牌 */
        .security-notice {
            background: rgba(255, 69, 58, 0.15);
            border: 1px solid #ff453a;
            border-radius: 12px;
            padding: 12px 16px;
            max-width: 340px;
            width: 100%;
            text-align: left;
            margin-bottom: 5px;
        }
        .security-notice-title {
            color: #ff453a;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .security-notice-text {
            color: #ebebf5;
            font-size: 12px;
            line-height: 1.5;
            opacity: 0.9;
        }

        .room-box { background: #2c2c2e; padding: 18px; border-radius: 16px; width: 100%; max-width: 340px; border: 1px solid #38383a; margin-bottom: 5px; }
        .room-box label { display: block; font-size: 14px; color: #ffd60a; margin-bottom: 8px; font-weight: bold; }
        .room-box input { width: 100%; padding: 12px; font-size: 18px; border-radius: 10px; border: 1px solid #007aff; background: #1c1c1e; color: #fff; text-align: center; letter-spacing: 2px; }

        .mode-btn { width: 100%; max-width: 340px; padding: 18px; font-size: 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 14px; color: white; transition: 0.2s; text-align: center; }
        .btn-display { background: #007aff; }
        .btn-control { background: #34c759; }

        /* 2. 長官顯示端 */
        #display-view { display: none; width: 100vw; height: 100vh; background: #000; flex-direction: column; justify-content: space-between; align-items: center; padding: 2vh 2vw; text-align: center; position: relative; user-select: none; }
        .display-header { width: 100%; display: flex; justify-content: space-between; align-items: center; height: 60px; padding: 0 20px; z-index: 5; }
        #sender-tag { font-size: 3.5vw; color: #ffd60a; font-weight: bold; }
        #history-counter { font-size: 2vw; color: #8e8e93; background: #1c1c1e; padding: 4px 14px; border-radius: 20px; }
        
        #message-container { flex-grow: 1; width: 100%; display: flex; justify-content: center; align-items: center; padding: 10px; overflow: hidden; }
        #message-box { 
            font-weight: 900; 
            line-height: 1.2; 
            letter-spacing: 1px;
            color: #ffffff;
            word-break: break-all;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* 遮蔽狀態文字樣式 */
        #message-box.masked-state {
            color: #636366 !important;
            font-size: 10vw !important;
        }

        /* 左下角遮蔽切換按鈕 */
        .mask-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(44, 44, 46, 0.8);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            backdrop-filter: blur(10px);
            transition: 0.2s;
        }
        .mask-btn:active { opacity: 0.7; }
        .mask-btn.active-mask {
            border-color: #ff453a;
            color: #ff453a;
            background: rgba(255, 69, 58, 0.15);
        }

        /* 左右切換按鈕輔助 */
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.15); color: white; border: none; font-size: 30px; width: 50px; height: 80px; border-radius: 10px; cursor: pointer; display: flex; justify-content: center; align-items: center; z-index: 5; }
        .nav-left { left: 10px; }
        .nav-right { right: 10px; }

        /* 3. 幕僚控制端 */
        #control-view { display: none; padding: 20px; max-width: 600px; margin: 0 auto; color: #f2f2f7; background: #1c1c1e; height: 100vh; overflow-y: auto; }
        .control-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; text-align: center; color: #fff; line-height: 1.3; }
        .input-group { margin-bottom: 12px; }
        label { font-size: 14px; color: #8e8e93; display: block; margin-bottom: 5px; }
        input[type="text"] { width: 100%; padding: 12px; font-size: 18px; border-radius: 10px; border: 1px solid #38383a; background: #2c2c2e; color: #fff; }
        textarea { width: 100%; height: 90px; font-size: 20px; padding: 12px; border-radius: 10px; border: 1px solid #38383a; background: #2c2c2e; color: #fff; resize: none; margin-bottom: 5px; }
        .char-count { text-align: right; font-size: 12px; color: #8e8e93; margin-bottom: 10px; }
        
        .send-btn { width: 100%; padding: 16px; font-size: 22px; font-weight: bold; background: #30d158; color: white; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 8px; }
        .clear-btn { background: #ff453a; }
        .status-tag { text-align: center; font-size: 13px; color: #30d158; margin-bottom: 10px; }

        /* 快捷詞區塊 Header 與按鈕 */
        .presets-header { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; margin-bottom: 12px; border-top: 1px solid #38383a; padding-top: 15px; }
        .btn-group-right { display: flex; gap: 8px; }
        .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 30px; }
        .preset-btn { padding: 12px; font-size: 15px; background: #2c2c2e; border: 1px solid #38383a; border-radius: 8px; color: #fff; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
        .preset-btn:active { background: #007aff; }
        .edit-input { width: 100%; padding: 10px; font-size: 14px; background: #1c1c1e; border: 1px solid #007aff; border-radius: 8px; color: #fff; }
        
        .action-btn { border: none; padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: bold; }
        .btn-edit { background: #0a84ff; color: white; }
        .btn-reset { background: #48484a; color: #ff9f0a; }
    </style>
</head>
<body>

    <!-- 1. 選擇身份與輸入安全密碼頁面 -->
    <div id="setup-view" class="mode-selector">
        <h2>連江縣政府行政處<br>議會質詢即時提示系統</h2>
        <p>請設定今日連線安全金鑰並注意使用規範</p>
        
        <!-- 資安注意事項告示 -->
        <div class="security-notice">
            <div class="security-notice-title">⚠️ 資安注意事項</div>
            <div class="security-notice-text">
                本系統為公開系統，採用簡易的邏輯隔離，無實質點對點加密，請勿發送帶有機敏性訊息以防止竊聽。
            </div>
        </div>

        <div class="room-box">
            <label>🔑 頻道安全密碼 (當天需一致)</label>
            <input type="text" id="room-key" value="matsu2026" placeholder="請輸入動態密碼" maxlength="20">
        </div>

        <button class="mode-btn btn-display" onclick="startDisplay()">長官（顯示端）</button>
        <button class="mode-btn btn-control" onclick="startControl()">幕僚（控制端）</button>
    </div>

    <!-- 2. 長官顯示頁面 -->
    <div id="display-view">
        <div class="display-header">
            <div id="sender-tag"></div>
            <div id="history-counter">0/0</div>
        </div>
        
        <div id="message-container">
            <div id="message-box">等待訊息輸入...</div>
        </div>

        <!-- 左下角遮蔽切換按鈕 -->
        <button class="mask-btn" id="mask-toggle-btn" onclick="toggleMask()">遮蔽OFF</button>

        <button class="nav-btn nav-left" onclick="navigateHistory(-1)">❮</button>
        <button class="nav-btn nav-right" onclick="navigateHistory(1)">❯</button>
    </div>

    <!-- 3. 幕僚控制頁面 -->
    <div id="control-view">
        <div class="control-title">連江縣政府行政處<br>議會質詢推播控制台</div>
        <div id="status" class="status-tag">連線驗證中...</div>
        
        <div class="input-group">
            <label>您的單位/職稱</label>
            <input type="text" id="sender-input" placeholder="例如：行政處" value="行政處">
        </div>

        <div class="input-group">
            <label>提示訊息（上限 50 字）</label>
            <textarea id="text-input" maxlength="50" oninput="updateCharCount()" placeholder="請輸入訊息..."></textarea>
            <div class="char-count"><span id="char-num">0</span> / 50 字</div>
        </div>

        <button class="send-btn" onclick="sendMessage()">同步傳送至所有長官螢幕</button>
        <button class="send-btn clear-btn" onclick="clearMessage()">清空所有長官螢幕</button>

        <!-- 常用 10 組快捷詞區塊 -->
        <div class="presets-header">
            <span style="font-weight: bold; font-size: 15px;">自訂 10 組快捷詞：</span>
            <div class="btn-group-right">
                <button class="action-btn btn-reset" onclick="restoreDefaultPresets()">一鍵恢復預設</button>
                <button class="action-btn btn-edit" id="edit-preset-btn" onclick="toggleEditPresets()">編輯內容</button>
            </div>
        </div>
        <div class="preset-grid" id="preset-container"></div>
    </div>

    <script>
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        let DYNAMIC_TOPIC = ''; 

        // 長官端歷史紀錄與遮蔽狀態
        let historyList = []; 
        let currentIndex = -1;
        let isMasked = false;

        // 系統預設 10 組標準快捷詞
        const systemDefaultPresets = [
            "已交辦權責局處辦理",
            "預算已於本期編列",
            "預計今年底前完成",
            "會後提供書面資料",
            "研議研擬方案辦理",
            "積極向中央爭取補助",
            "感謝議員關心與指教",
            "配合中央法規推動",
            "本案刻正進行規劃",
            "相關數據會後補充"
        ];

        let myPresets = [...systemDefaultPresets];
        let isEditing = false;

        function getSecureTopic() {
            const keyInput = document.getElementById('room-key').value.trim() || 'matsu2026';
            return `matsu_parliament_prompt_2026_${keyInput}`;
        }

        /* --- 長官端邏輯 --- */
        function startDisplay() {
            DYNAMIC_TOPIC = getSecureTopic();

            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('display-view').style.display = 'flex';
            
            client.subscribe(DYNAMIC_TOPIC);
            client.on('message', (topic, payload) => {
                if (topic !== DYNAMIC_TOPIC) return;
                
                try {
                    const data = JSON.parse(payload.toString());
                    
                    if (data.text === '') {
                        historyList = [];
                        currentIndex = -1;
                        renderDisplay('', '等待訊息輸入...');
                        document.getElementById('history-counter').innerText = '0/0';
                        return;
                    }

                    historyList.push(data);
                    if (historyList.length > 10) {
                        historyList.shift();
                    }
                    
                    currentIndex = historyList.length - 1;
                    updateDisplayView();
                } catch (e) {
                    console.error("無效訊息格式");
                }
            });

            setupTouchEvents();
        }

        // 遮蔽切換功能
        function toggleMask() {
            isMasked = !isMasked;
            const maskBtn = document.getElementById('mask-toggle-btn');

            if (isMasked) {
                maskBtn.innerText = '遮蔽ON';
                maskBtn.classList.add('active-mask');
            } else {
                maskBtn.innerText = '遮蔽OFF';
                maskBtn.classList.remove('active-mask');
            }

            // 重新渲染畫面呈現
            updateDisplayView();
        }

        function updateDisplayView() {
            if (currentIndex >= 0 && currentIndex < historyList.length) {
                const item = historyList[currentIndex];
                renderDisplay(item.sender, item.text);
                document.getElementById('history-counter').innerText = `${currentIndex + 1}/${historyList.length}`;
            } else if (historyList.length === 0) {
                renderDisplay('', '等待訊息輸入...');
            }
        }

        function renderDisplay(sender, text) {
            const messageBox = document.getElementById('message-box');
            const senderTag = document.getElementById('sender-tag');
            
            senderTag.innerText = sender ? `【${sender}】` : '';
            
            // 若開啟遮蔽，內文替換為「遮蔽中」
            if (isMasked) {
                messageBox.innerText = '遮蔽中';
                messageBox.classList.add('masked-state');
            } else {
                messageBox.innerText = text;
                messageBox.classList.remove('masked-state');
                adjustFontSize(text ? text.length : 0);
            }
        }

        function navigateHistory(direction) {
            if (historyList.length === 0) return;
            let newIndex = currentIndex + direction;
            if (newIndex >= 0 && newIndex < historyList.length) {
                currentIndex = newIndex;
                updateDisplayView();
            }
        }

        let touchStartX = 0;
        function setupTouchEvents() {
            const displayView = document.getElementById('display-view');
            displayView.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
            displayView.addEventListener('touchend', e => {
                let touchEndX = e.changedTouches[0].screenX;
                if (touchStartX - touchEndX > 50) navigateHistory(1);
                if (touchEndX - touchStartX > 50) navigateHistory(-1);
            });
        }

        function adjustFontSize(length) {
            const box = document.getElementById('message-box');
            if (length === 0 || isMasked) return;
            
            if (length <= 6) {
                box.style.fontSize = '18vw';
            } else if (length <= 12) {
                box.style.fontSize = '13vw';
            } else if (length <= 20) {
                box.style.fontSize = '9.5vw';
            } else if (length <= 35) {
                box.style.fontSize = '6.8vw';
            } else {
                box.style.fontSize = '5.2vw';
            }
        }

        /* --- 幕僚端邏輯 --- */
        function startControl() {
            DYNAMIC_TOPIC = getSecureTopic();

            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('control-view').style.display = 'block';
            
            const keyText = document.getElementById('room-key').value.trim() || 'matsu2026';
            document.getElementById('status').innerText = `● 雲端邏輯隔離通道已連線 [金鑰: ${keyText}]`;

            loadPresetsFromStorage();
            renderPresets();
        }

        function updateCharCount() {
            const text = document.getElementById('text-input').value;
            document.getElementById('char-num').innerText = text.length;
        }

        function sendMessage() {
            const sender = document.getElementById('sender-input').value.trim();
            const text = document.getElementById('text-input').value.trim();
            if (text && DYNAMIC_TOPIC) {
                const payload = JSON.stringify({ sender: sender, text: text });
                client.publish(DYNAMIC_TOPIC, payload);
            }
        }

        function sendPresetByIndex(index) {
            const text = myPresets[index];
            if (text) {
                document.getElementById('text-input').value = text;
                updateCharCount();
                sendMessage();
            }
        }

        function clearMessage() {
            document.getElementById('text-input').value = '';
            updateCharCount();
            if (DYNAMIC_TOPIC) {
                const payload = JSON.stringify({ sender: '', text: '' });
                client.publish(DYNAMIC_TOPIC, payload);
            }
        }

        /* --- 快捷詞讀取與管理 --- */
        function loadPresetsFromStorage() {
            const saved = localStorage.getItem('matsu_parliament_presets_v2');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (Array.isArray(parsed) && parsed.length === 10) {
                        myPresets = parsed;
                    }
                } catch(e) {
                    console.error("記憶庫讀取異常");
                }
            }
        }

        function renderPresets() {
            const container = document.getElementById('preset-container');
            container.innerHTML = '';

            myPresets.forEach((presetText, index) => {
                if (isEditing) {
                    container.innerHTML += `
                        <input type="text" class="edit-input" id="preset-input-${index}" value="${presetText.replace(/"/g, '&quot;')}" placeholder="快捷詞 ${index + 1}">
                    `;
                } else {
                    const safeText = presetText.replace(/"/g, '&quot;').replace(/'/g, "&#39;");
                    container.innerHTML += `
                        <button class="preset-btn" onclick="sendPresetByIndex(${index})">${index + 1}. ${safeText}</button>
                    `;
                }
            });
        }

        function toggleEditPresets() {
            const editBtn = document.getElementById('edit-preset-btn');
            
            if (!isEditing) {
                isEditing = true;
                editBtn.innerText = '儲存快捷詞';
                editBtn.style.background = '#30d158';
                renderPresets();
            } else {
                for (let i = 0; i < 10; i++) {
                    const inputEl = document.getElementById(`preset-input-${i}`);
                    if (inputEl) {
                        myPresets[i] = inputEl.value.trim() || `快捷詞 ${i + 1}`;
                    }
                }
                
                localStorage.setItem('matsu_parliament_presets_v2', JSON.stringify(myPresets));
                
                isEditing = false;
                editBtn.innerText = '編輯內容';
                editBtn.style.background = '#0a84ff';
                renderPresets();
            }
        }

        function restoreDefaultPresets() {
            if (confirm("確定要將 10 組快捷詞還原為系統預設值嗎？")) {
                myPresets = [...systemDefaultPresets];
                localStorage.setItem('matsu_parliament_presets_v2', JSON.stringify(myPresets));
                if (isEditing) {
                    isEditing = false;
                    document.getElementById('edit-preset-btn').innerText = '編輯內容';
                    document.getElementById('edit-preset-btn').style.background = '#0a84ff';
                }
                renderPresets();
            }
        }
    </script>
</body>
</html>
